<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Cibersegura - ciclo iT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            background-color: #eef1f6;
            background-image:
                radial-gradient(circle, #c8d4e8 1px, transparent 1px),
                linear-gradient(to right, rgba(32, 178, 170, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(32, 178, 170, 0.04) 1px, transparent 1px);
            background-size: 28px 28px, 56px 56px, 56px 56px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 50px;
            color: #222;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-logo {
            font-size: 2.4rem;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: -1px;
            line-height: 1;
        }

        .brand-logo span {
            color: #20b2aa;
        }

        .brand-subtitle {
            display: inline-block;
            background: linear-gradient(135deg, #1a1a2e, #2a3a5e);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 7px 28px;
            border-radius: 6px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* ── SCORE ── */
        .score-board {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            border: 2px solid #20b2aa;
            color: #1a1a2e;
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(32, 178, 170, 0.15);
            z-index: 100;
        }

        .score-board span {
            color: #20b2aa;
        }

        /* ── GAME CONTAINER ── */
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
            width: 100%;
            max-width: 1000px;
        }

        /* ── WHEEL ── */
        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Metallic outer ring */
        .wheel-outer-ring {
            position: relative;
            width: 470px;
            height: 470px;
            border-radius: 50%;
            background: linear-gradient(145deg, #d0d8e4, #b8c4d4, #d0d8e4);
            box-shadow:
                0 0 0 3px #a0b0c0,
                0 8px 40px rgba(0, 0, 0, 0.18),
                inset 0 2px 6px rgba(255, 255, 255, 0.7),
                inset 0 -2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Rivets */
        .wheel-outer-ring::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.45);
            pointer-events: none;
        }

        /* Canvas wrapper */
        .wheel-canvas-wrapper {
            position: relative;
            width: 420px;
            height: 420px;
        }

        #wheel {
            width: 420px;
            height: 420px;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            display: block;
        }

        /* Center button */
        .wheel-center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #3dd4cc, #20b2aa 50%, #178c87);
            border: 5px solid #e0eaf2;
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.25),
                inset 0 2px 6px rgba(255, 255, 255, 0.4),
                inset 0 -3px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 20;
            transition: transform 0.1s, box-shadow 0.1s;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            outline: none;
        }

        .wheel-center-btn:hover:not(:disabled) {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow:
                0 6px 22px rgba(32, 178, 170, 0.4),
                inset 0 2px 6px rgba(255, 255, 255, 0.4),
                inset 0 -3px 6px rgba(0, 0, 0, 0.2);
        }

        .wheel-center-btn:active:not(:disabled) {
            transform: translate(-50%, -50%) scale(0.97);
        }

        .wheel-center-btn:disabled {
            opacity: 0.75;
            cursor: not-allowed;
        }

        /* Pointer */
        .pointer-wrap {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
        }

        .pointer-wrap svg {
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.25));
        }

        /* Rivets dots rendered via JS overlay */
        .rivets-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }

        /* ── QUESTION PANEL ── */
        .question-panel {
            background: #fff;
            border-radius: 22px;
            padding: 30px;
            min-width: 360px;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .category-badge {
            display: inline-block;
            padding: 7px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 22px;
            line-height: 1.5;
            min-height: 70px;
            color: #1a1a2e;
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            background: #f7f9fc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.25s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: #e8f8f7;
            border-color: #20b2aa;
            transform: translateX(4px);
        }

        .option-btn.correct {
            background: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
        }

        .option-btn.wrong {
            background: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .result-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .result-message.show {
            opacity: 1;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .explanation-text {
            margin-top: 14px;
            padding: 14px 16px;
            background: #f0fafa;
            border-left: 4px solid #20b2aa;
            border-radius: 6px;
            font-style: italic;

            text-align: center;

            line-height: 1.8;
        }

            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }

        @media (max-width: 960px) {
            .wheel-outer-ring {
                width: 360px;
                height: 360px;
            }

            .wheel-canvas-wrapper {
                width: 320px;
                height: 320px;
            }

            #wheel {
                width: 320px;
                height: 320px;
            }

            .wheel-center-btn {
                width: 88px;
                height: 88px;
                font-size: 0.9rem;
            }

            .question-panel {
                min-width: auto;
                max-width: 100%;
            }
        }
    </style>
</head>

            { name: 'Bonus', color: '#ffffff', textColor: '#1a2e3a', icon: '⭐' },
            { name: 'Internet', color: '#20b2aa', textColor: '#ffffff', icon: '📶' },
            { name: 'Bonus', color: '#ffffff', textColor: '#1a2e3a', icon: '🎁' },
        ];

        // ── QUESTIONS DB ─────────────────────────────────────────────────
        const questionsDB = {

                    options: ['123456', 'Nombre123', 'Contraseña123', 'G7!kP#92Lm'],

                },

                },

            ],
            'Engaños Digitales': [
                {

                    options: ['Se lo doy', 'Verifico antes'],

                    options: ['Los doy', 'No los doy'],

                },
                {

                    options: ['Le creo', 'Verifico'],

            ],
            'Riesgos': [
                {

                    correct: 1,
                    explanation: 'Un solo click puede descargar código malicioso que tome control de tu equipo silenciosamente.'
                },
                {

                    options: ['Está bien', 'Es riesgoso'],

                }
            ],

                {

                },
                {

                    options: ['Sí', 'No'],
                    correct: 0,
                    explanation: 'La mayoría de los incidentes de seguridad exitosos ocurren debido a un descuido o falta de conocimiento.'
                }
            ]

        // ── STATE ─────────────────────────────────────────────────────────
        let currentRotation  = 0;
        let isSpinning       = false;
        let score            = 0;
        let currentCategory  = null;
        let currentExplanation = '';
        let questionsAnswered   = new Set();

        // Round tracking
        const TOTAL_QUESTIONS = 3;
        let roundQuestions  = 0;   // preguntas respondidas en la ronda
        let correctAnswers  = 0;   // respuestas correctas en la ronda
        let usedCategories  = new Set(); // categorías ya usadas en la ronda

        // ── DRAW RIVETS ───────────────────────────────────────────────────
        function drawRivets() {
            const c = document.getElementById('rivetsCanvas');
            const ctx = c.getContext('2d');
            const cx = c.width / 2;
            const cy = c.height / 2;
            const r = 225;
            const n = 28;

            for (let i = 0; i < n; i++) {
                const angle = (i / n) * Math.PI * 2;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);

                const grad = ctx.createRadialGradient(x - 1, y - 1, 1, x, y, 6);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.5, '#c8d4e0');
                grad.addColorStop(1, '#8090a8');

                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#a0b0c0';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
        }

        // ── DRAW WHEEL ────────────────────────────────────────────────────
        function drawWheel() {
            const canvas = document.getElementById('wheel');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 205;
            const sliceA = (2 * Math.PI) / categories.length;

            // Outer shadow ring
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 5;
            ctx.stroke();

            categories.forEach((cat, idx) => {
                const startAngle = idx * sliceA - Math.PI / 2;
                const endAngle   = (idx + 1) * sliceA - Math.PI / 2;
                const midAngle   = startAngle + sliceA / 2;

                // Icon/label position
                const iconDist  = radius * 0.68;
                const iconX     = cx + iconDist * Math.cos(midAngle);
                const iconY     = cy + iconDist * Math.sin(midAngle);

                // ── Metallic radial gradient per segment ──
                const isTeal = cat.color !== '#ffffff';
                const grad   = ctx.createRadialGradient(iconX, iconY, 2, cx, cy, radius);

                if (isTeal) {
                    // Metallic teal: highlight → mid → deep
                    grad.addColorStop(0.0,  '#6de8e0');
                    grad.addColorStop(0.25, '#38c9c1');
                    grad.addColorStop(0.55, '#20b2aa');
                    grad.addColorStop(0.80, '#178c86');
                    grad.addColorStop(1.0,  '#0f6860');
                } else {
                    // Metallic white/silver
                    grad.addColorStop(0.0,  '#ffffff');
                    grad.addColorStop(0.25, '#f0f4f8');
                    grad.addColorStop(0.55, '#dde4ee');
                    grad.addColorStop(0.80, '#c8d4e0');
                    grad.addColorStop(1.0,  '#b0bece');
                }

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();

                // Bright edge highlight (thin arc near outer rim)
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.clip();
                ctx.beginPath();
                ctx.arc(cx, cy, radius - 1, startAngle, endAngle);
                ctx.strokeStyle = isTeal ? 'rgba(160,240,236,0.45)' : 'rgba(255,255,255,0.7)';
                ctx.lineWidth   = 6;
                ctx.stroke();
                ctx.restore();

                // Segment divider
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.strokeStyle = isTeal ? '#0d7a74' : '#a8b8cc';
                ctx.lineWidth   = 1.5;
                ctx.stroke();

                // ── Icon ──
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(midAngle);
                ctx.font = '18px serif';
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(cat.icon, radius * 0.68, -7);
                ctx.restore();

                // ── Label ──
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(midAngle);
                const words = cat.name.split(' ');
                ctx.font      = `bold ${words.length > 1 ? '11' : '13'}px Outfit, Arial`;
                ctx.fillStyle = isTeal ? '#ffffff' : '#1a2e3a';
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                if (words.length === 1) {
                    ctx.fillText(cat.name, radius * 0.68, 12);
                } else {
                    ctx.fillText(words[0], radius * 0.68, 10);
                    ctx.fillText(words.slice(1).join(' '), radius * 0.68, 22);
                }
                ctx.restore();
            });

            // Inner metallic ring (behind center button)
            const innerGrad = ctx.createRadialGradient(cx - 20, cy - 20, 5, cx, cy, 72);
            innerGrad.addColorStop(0,   '#e8f0f8');
            innerGrad.addColorStop(0.5, '#c8d4e0');
            innerGrad.addColorStop(1,   '#9aaabb');
            ctx.beginPath();
            ctx.arc(cx, cy, 65, 0, Math.PI * 2);
            ctx.fillStyle   = innerGrad;
            ctx.fill();
            ctx.strokeStyle = '#8898aa';
            ctx.lineWidth   = 3;
            ctx.stroke();
        }

        // ── SPIN ──────────────────────────────────────────────────────────
        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const extraSpins  = 5 + Math.random() * 3;
            const randomAngle = Math.random() * 360;
            const newRotation = currentRotation + (extraSpins * 360) + randomAngle;

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${newRotation}deg)`;

            const sliceAngle = 360 / categories.length;
            const actualRot  = newRotation % 360;
            const winningIdx = Math.floor(((360 - actualRot) % 360) / sliceAngle) % categories.length;

            currentCategory = categories[winningIdx];
            currentRotation = newRotation;

            setTimeout(() => {
                isSpinning = false;

                // Si la categoría ya fue usada en esta ronda, volver a girar
                if (usedCategories.has(currentCategory.name)) {
                    document.getElementById('questionPanel').innerHTML = `
                        <div class="waiting-message">
                            <span class="icon">🔄</span>
                            <p><strong>${currentCategory.icon} ${currentCategory.name}</strong> ya fue jugada.</p>
                            <p style="color:#20b2aa;">Girando de nuevo automáticamente...</p>
                        </div>
                    `;
                    setTimeout(spinWheel, 1500);
                } else {
                    usedCategories.add(currentCategory.name);
                    document.getElementById('spinBtn').disabled = false;
                    showQuestion(currentCategory);
                }
            }, 4000);
        }

        // ── SHOW QUESTION ─────────────────────────────────────────────────
        function showQuestion(category) {
            const questions = questionsDB[category.name];
            const available = questions.filter((_, idx) =>
                !questionsAnswered.has(`${category.name}-${idx}`)
            );

            if (available.length === 0) {
                questions.forEach((_, idx) => questionsAnswered.delete(`${category.name}-${idx}`));
            }

            const qIdx = Math.floor(Math.random() * questions.length);
            const qData = questions[qIdx];
            currentExplanation = qData.explanation || '';
            questionsAnswered.add(`${category.name}-${qIdx}`);

            // Keep the button locked until the user answers
            document.getElementById('spinBtn').disabled = true;

            const bg    = category.color === '#ffffff' ? '#20b2aa' : category.color;
            const tc    = '#ffffff';
            const panel = document.getElementById('questionPanel');

            panel.innerHTML = `
                <div class="category-badge" style="background:${bg}; color:${tc}">
                    ${category.icon} ${category.name}
                </div>
                <div style="font-size:0.85rem; color:#6b7a99; margin-bottom:14px; font-weight:600;">
                    Pregunta ${roundQuestions + 1} de ${TOTAL_QUESTIONS}
                </div>
                <div class="question-text">${qData.question}</div>
                <div class="options-container">
                    ${qData.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(${i}, ${qData.correct}, this)">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="result-message" id="resultMessage"></div>
                <div id="explanationContainer"></div>
            `;
        }

        // ── CHECK ANSWER ──────────────────────────────────────────────────
        function checkAnswer(selected, correct, btn) {
            const allBtns  = document.querySelectorAll('.option-btn');
            const resultEl = document.getElementById('resultMessage');
            const explEl   = document.getElementById('explanationContainer');

            allBtns.forEach((b, i) => {
                b.disabled = true;
                if (i === correct) b.classList.add('correct');
                else if (i === selected) b.classList.add('wrong');
            });

            roundQuestions++;
            const isCorrect = selected === correct;
            if (isCorrect) {
                correctAnswers++;
                score += 10;
                document.getElementById('score').textContent = score;
                resultEl.textContent = '¡Correcto! +10 puntos 🎉';
                resultEl.className   = 'result-message show success';
            } else {
                resultEl.textContent = 'Incorrecto. La respuesta correcta es la opción ' + String.fromCharCode(65 + correct);
                resultEl.className   = 'result-message show error';
            }

            if (currentExplanation) {
                explEl.innerHTML = `
                    <div class="explanation-text">
                        <strong>💡 Sabías que...</strong><br>
                        ${currentExplanation}
                    </div>
                `;
            }

            // Indicador de progreso
            const remaining = TOTAL_QUESTIONS - roundQuestions;
            const progressText = roundQuestions < TOTAL_QUESTIONS
                ? `<p style="color:#6b7a99; font-size:0.9rem; margin-top:8px;">Pregunta ${roundQuestions} de ${TOTAL_QUESTIONS} — quedan ${remaining} ${remaining === 1 ? 'giro' : 'giros'}</p>`
                : '';
            explEl.innerHTML += progressText;

            const delay = roundQuestions >= TOTAL_QUESTIONS ? 5000 : 6000;

            setTimeout(() => {
                if (roundQuestions >= TOTAL_QUESTIONS) {
                    showFinalResult();
                } else {
                    // Re-habilitar el botón para el próximo giro
                    document.getElementById('spinBtn').disabled = false;
                    document.getElementById('questionPanel').innerHTML = `
                        <div class="waiting-message">
                            <span class="icon">✅</span>
                            <p><strong>¡Girá de nuevo!</strong></p>
                            <p style="color:#20b2aa; font-weight:700;">
                                ${currentCategory.icon} ${currentCategory.name}
                            </p>
                            <p style="color:#6b7a99; font-size:0.9rem; margin-top:6px;">Pregunta ${roundQuestions} de ${TOTAL_QUESTIONS} respondida</p>
                        </div>
                    `;
                }
            }, delay);
        }

        // ── FINAL RESULT ──────────────────────────────────────────────────
        function showFinalResult() {
            // Bloquear el botón durante la pantalla final
            document.getElementById('spinBtn').disabled = true;

            let emoji, headline, subtext, bgColor;

            if (correctAnswers === 3) {
                emoji     = '🏆';
                headline  = '¡Tenés buenos hábitos de seguridad!';
                subtext   = 'Respondiste correctamente las 3 preguntas. ¡Seguí así!';
                bgColor   = '#d4f7ed';
            } else if (correctAnswers === 2) {
                emoji     = '📈';
                headline  = 'Podrías mejorar algunas prácticas';
                subtext   = 'Respondiste 2 de 3 correctamente. Hay margen para reforzar tu seguridad.';
                bgColor   = '#fff8e1';
            } else {
                emoji     = '⚠️';
                headline  = 'Tu empresa podría estar en riesgo';
                subtext   = `Solo respondiste ${correctAnswers} de 3 correctamente. Es momento de tomar acción.`;
                bgColor   = '#fdecea';
            }

            const panel = document.getElementById('questionPanel');
            panel.innerHTML = `
                <div style="text-align:center; padding: 20px 10px;">
                    <div style="font-size:3rem; margin-bottom:12px;">${emoji}</div>
                    <div style="background:${bgColor}; border-radius:14px; padding:20px; margin-bottom:20px;">
                        <p style="font-size:1.25rem; font-weight:800; color:#1a2e3a; margin-bottom:8px;">${headline}</p>
                        <p style="color:#445; font-size:0.95rem;">${subtext}</p>
                    </div>
                    <div style="background: linear-gradient(135deg,#1a1a2e,#20b2aa); border-radius:14px; padding:20px; color:#fff;">
                        <p style="font-size:0.95rem; line-height:1.6; margin-bottom:10px;">
                            🔒 <em>La seguridad no depende solo del sistema,<br>depende de las <strong>personas</strong>.</em>
                        </p>
                        <p style="font-size:1rem; font-weight:700; letter-spacing:0.5px;">CicloIT te ayuda a proteger tu empresa</p>
                    </div>
                    <p style="color:#20b2aa; font-size:0.85rem; margin-top:18px; font-style:italic;">El juego se reinicia en unos segundos...</p>
                </div>
            `;

            // Reiniciar después de 7 segundos
            setTimeout(resetGame, 7000);
        }

        // ── RESET GAME ────────────────────────────────────────────────────
        function resetGame() {
            roundQuestions     = 0;
            correctAnswers     = 0;
            score              = 0;
            questionsAnswered.clear();
            usedCategories.clear();
            currentCategory    = null;
            currentExplanation = '';

            document.getElementById('score').textContent = 0;
            document.getElementById('spinBtn').disabled  = false;

            // Reset wheel rotation visually
            const wheel = document.getElementById('wheel');
            wheel.style.transition = 'none';
            wheel.style.transform  = 'rotate(0deg)';
            currentRotation = 0;
            // Re-enable transition after a tick
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
                });
            });

            document.getElementById('questionPanel').innerHTML = `
                <div class="waiting-message">
                    <span class="icon">🎡</span>
                    <p><strong>¡Nueva ronda! Presioná GIRAR para comenzar</strong></p>
                    <p>Respondé 3 preguntas y descubrí tu nivel de seguridad</p>
                </div>
            `;
        }

        // ── INIT ──────────────────────────────────────────────────────────
        drawWheel();
        drawRivets();
    </script>
</body>

</html>
